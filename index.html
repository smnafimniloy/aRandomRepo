<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💖 A Special Date for You 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 55%, #fad0c4 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }
        .floating-hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .heart-bg {
            position: absolute;
            color: rgba(255, 105, 180, 0.25);
            font-size: 1.8rem;
            animation: floatUp 12s linear infinite;
            bottom: -50px;
            user-select: none;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
        .card {
            background: rgba(255, 248, 245, 0.97);
            backdrop-filter: blur(2px);
            border-radius: 58px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            max-width: 550px;
            width: 100%;
            padding: 1.8rem 1.5rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 10;
            position: relative;
            border: 1px solid rgba(255, 215, 215, 0.8);
        }
        .heart-icon {
            font-size: 3.2rem;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 0.2rem;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 8px #ff4d6d; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #c44569;
            margin: 0.5rem 0 0.2rem;
        }
        .intro {
            font-size: 1rem;
            font-weight: 600;
            color: #e66767;
            background: #fff0f0;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            margin: 0.5rem 0 0.8rem;
        }
        .date-location {
            background: #ffe5e5;
            border-radius: 60px;
            padding: 0.7rem 0.8rem;
            margin: 0.8rem 0 1.2rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            font-weight: 600;
            font-size: 1rem;
            color: #b83b5e;
        }
        .date-location i {
            margin-right: 6px;
            color: #f06292;
        }
        .question {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7e5e, #feb47b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.5rem 0 1.2rem;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 0.8rem 0 1rem;
        }
        .btn {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            touch-action: manipulation;
            min-width: 170px;
            justify-content: center;
        }
        .yes {
            background: #ff6b81;
            color: white;
            border-bottom: 4px solid #c44569;
        }
        .yes:active { transform: translateY(2px); background: #ff4757; }
        .no {
            background: #b2bec3;
            color: #2d3436;
            border-bottom: 4px solid #636e72;
        }
        .no:active { transform: translateY(2px); background: #dfe6e9; }
        .shake-btn { animation: shake 0.4s ease-in-out 0s 2; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .response-message {
            min-height: 100px;
            margin: 1rem 0 0.6rem;
            font-size: 1.15rem;
            font-weight: 600;
            color: #c44569;
            background: #fff0f0;
            padding: 14px 16px;
            border-radius: 48px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer-note {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: #e5989b;
            font-weight: 500;
            border-top: 1px dashed #ffcdd6;
            padding-top: 0.8rem;
        }
        .celebration-box {
            background: transparent;
        }
        @media (max-width: 550px) {
            .card { padding: 1.5rem 1.2rem; }
            h1 { font-size: 1.6rem; }
            .question { font-size: 1.5rem; }
            .btn { font-size: 1.2rem; padding: 10px 20px; min-width: 150px; }
            .date-location { font-size: 0.9rem; gap: 0.8rem; }
            .response-message { font-size: 1rem; }
        }
        @media (max-width: 420px) {
            .btn { font-size: 1.1rem; padding: 8px 18px; min-width: 130px; }
        }
        button:disabled { opacity: 0.6; cursor: default; }
    </style>
</head>
<body>
<div class="floating-hearts-bg" id="floatingHearts"></div>
<div class="card" id="mainCard" role="main" aria-labelledby="main-question">
    <div class="heart-icon"><i class="fas fa-heart" style="color: #ff4d6d;"></i></div>
    <h1>Hey Beautiful,</h1>
    <div class="intro"><i class="fas fa-star-of-life"></i> a little question for you <i class="fas fa-star-of-life"></i></div>
    <div class="date-location">
        <span><i class="fas fa-calendar-alt"></i> 22nd May</span>
        <span><i class="fas fa-map-marker-alt"></i> Rajshahi — City of Love</span>
    </div>
    <div class="question" id="main-question" tabindex="0">✨ Will you go on a date with me? ✨</div>
    <div class="buttons" id="buttonGroup">
        <button class="btn yes" id="yesButton" type="button" aria-label="Yes, I'd love to go on a date!"><i class="fas fa-check-circle"></i> Yes, I'd love to!</button>
        <button class="btn no" id="noButton" type="button" aria-label="No"><i class="fas fa-heart-broken"></i> No</button>
    </div>
    <div id="responseArea" class="response-message" role="status" aria-live="polite">🌸 waiting for your sweet answer... 🌸</div>
    <div class="footer-note"><i class="fas fa-heart" style="color:#ff4d6d;"></i> Rajshahi awaits us — 22 May, full of joy <i class="fas fa-heart" style="color:#ff4d6d;"></i></div>
</div>

<script>
    const yesBtn = document.getElementById('yesButton');
    const noBtn = document.getElementById('noButton');
    const responseArea = document.getElementById('responseArea');
    const buttonGroup = document.getElementById('buttonGroup');
    const mainCard = document.getElementById('mainCard');
    let isAnswered = false;

    // floating hearts background
    function createFloatingHearts() {
        const container = document.getElementById('floatingHearts');
        const icons = ['❤️', '💖', '💗', '💓', '🌸', '🌹', '💕', '💞'];
        for (let i = 0; i < 22; i++) {
            const heartDiv = document.createElement('div');
            heartDiv.classList.add('heart-bg');
            heartDiv.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heartDiv.style.fontSize = (Math.random() * 25 + 16) + 'px';
            heartDiv.style.left = Math.random() * 100 + '%';
            heartDiv.style.animationDuration = Math.random() * 8 + 6 + 's';
            heartDiv.style.animationDelay = Math.random() * 10 + 's';
            heartDiv.style.opacity = Math.random() * 0.4 + 0.2;
            container.appendChild(heartDiv);
        }
    }
    createFloatingHearts();

    // temporary message (only for No button fun)
    let msgTimeout;
    function showTempMessage(msg) {
        if (msgTimeout) clearTimeout(msgTimeout);
        if (isAnswered) return;
        responseArea.innerHTML = `<i class="fas fa-heartbeat"></i> ${msg} <i class="fas fa-heartbeat"></i>`;
        responseArea.style.background = "#ffe6f0";
        msgTimeout = setTimeout(() => {
            if (!isAnswered) {
                responseArea.innerHTML = "🌸 waiting for your sweet answer... 🌸";
                responseArea.style.background = "#fff0f0";
            }
        }, 2500);
    }

    // YES celebration (robust)
    function celebrateYes() {
        if (isAnswered) return;
        isAnswered = true; // block further actions immediately
        yesBtn.disabled = true;
        noBtn.disabled = true;
        buttonGroup.style.display = 'none';

        // confetti
        canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, startVelocity: 20, colors: ['#ff6b81', '#ffb347', '#ff4d6d'] });
        canvasConfetti({ particleCount: 120, spread: 70, origin: { y: 0.7, x: 0.3 }, startVelocity: 22 });
        canvasConfetti({ particleCount: 120, spread: 70, origin: { y: 0.7, x: 0.7 }, startVelocity: 22 });
        setTimeout(() => canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.5 } }), 200);

        // cheerful message
        responseArea.innerHTML = `
            <div style="line-height:1.4;">
                <i class="fas fa-heart" style="font-size: 2rem; color:#ff4d6d;"></i>
                <strong style="font-size:1.6rem; display:block;">YAY! 💞</strong>
                <span style="font-size:1.2rem;">You just made me the happiest person! 🥰</span><br/>
                <span style="background:#ffe0e0; display:inline-block; padding:0.5rem 1rem; border-radius: 50px; margin-top: 0.6rem;">
                    📅 22nd May · 📍 Rajshahi – It's a DATE!
                </span>
                <div style="margin-top: 0.7rem; font-size:1rem;">
                    ✨ I can't wait to see you! Get ready for a magical day ✨
                </div>
            </div>
        `;
        responseArea.style.background = "#fee9e6";
        responseArea.style.color = "#b83b5e";
        
        // Update footer
        const footer = document.querySelector('.footer-note');
        if (footer) footer.innerHTML = `<i class="fas fa-heart" style="color:#ff4d6d;"></i> So excited for our date on 22 May, Rajshahi! <i class="fas fa-heart" style="color:#ff4d6d;"></i>`;
    }

    // playful No button (still no mango)
    function playfulNo() {
        if (isAnswered) return;
        const msgs = [
            "💕 Nice try! I know your heart says Yes! 💕",
            "🌸 That button is just for fun — click Yes, love! 🌸",
            "😘 You can't say No to a Rajshahi sunset date! 😘",
            "🌹 I'll bring your favourite flowers! Press Yes? 🌹",
            "💖 No way! Click Yes and let's make memories 💖"
        ];
        const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
        showTempMessage(randomMsg);
        noBtn.classList.add('shake-btn');
        setTimeout(() => noBtn.classList.remove('shake-btn'), 500);
        canvasConfetti({ particleCount: 20, spread: 45, origin: { y: 0.75, x: 0.7 }, startVelocity: 10, colors: ['#ff99cc', '#ffb3ba'], shapes: ['heart'] });
    }

    // event listeners
    yesBtn.addEventListener('click', (e) => { e.preventDefault(); if (!isAnswered) celebrateYes(); });
    yesBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!isAnswered) celebrateYes(); });
    noBtn.addEventListener('click', (e) => { e.preventDefault(); playfulNo(); });
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); playfulNo(); });

    // Keyboard accessibility for buttons
    yesBtn.addEventListener('keydown', function(e) {
        if ((e.key === "Enter" || e.key === " ") && !isAnswered) {
            e.preventDefault(); 
            celebrateYes();
        }
    });
    noBtn.addEventListener('keydown', function(e) {
        if ((e.key === "Enter" || e.key === " ") && !isAnswered) {
            e.preventDefault(); 
            playfulNo();
        }
    });

    // gentle reminder
    setTimeout(() => {
        if (!isAnswered) {
            responseArea.innerHTML = "💌 Hey love, my heart is waiting for your 'Yes'! 💌";
            responseArea.style.background = "#fff0f0";
            setTimeout(() => {
                if (!isAnswered) responseArea.innerHTML = "🌸 waiting for your sweet answer... 🌸";
            }, 3500);
        }
    }, 12000);

    // keep adding floating hearts
    setInterval(() => {
        const container = document.getElementById('floatingHearts');
        if (container && container.children.length < 45) {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = ['❤️','💖','🌸','💓','🌹'][Math.floor(Math.random()*5)];
            heart.style.fontSize = (Math.random() * 28 + 14) + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 10 + 5 + 's';
            heart.style.opacity = Math.random() * 0.45 + 0.15;
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 13000);
        }
    }, 5000);

</script>
</body>
</html>
